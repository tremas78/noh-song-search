<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070916" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOH Song Search" />
    <title>NOH Song Search</title>
    <link rel="manifest" href="./public/manifest.json" />
    <link rel="apple-touch-icon" href="./public/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-bar">
          <div class="brand-lockup" aria-label="NOH branding area">
            <img class="brand-logo" src="./public/logo.png" alt="NOH logo" />
            <h1>The Matrix</h1>
          </div>
        </div>
        <p class="intro">
          The repository of all knowledge.Search by artist, song, or plan name.
        </p>
      </section>

      <section class="panel">
        <label class="search-label" for="searchInput">Search</label>
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Try ABBA, Dancing Queen, or Christmas Show 2022"
          autocomplete="off"
        />

        <div class="meta">
          <p id="statusText">Loading sample data...</p>
          <button id="clearButton" class="clear-button" type="button">Clear</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Artist</th>
                <th>Song</th>
                <th>Plan Name</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <tr>
        <td colspan="4" class="empty-state">No matching songs found.</td>
      </tr>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
