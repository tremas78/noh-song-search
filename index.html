<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOH Song Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">NOH Archive</p>
        <h1>Search every song across your show plans.</h1>
        <p class="intro">
          This local prototype uses sample data only. Search by artist, song, or
          plan name to test the interface before we connect live data.
        </p>
      </section>

      <section class="panel">
        <label class="search-label" for="searchInput">Search</label>
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Try ABBA, Dancing Queen, or Christmas Show 2022"
          autocomplete="off"
        />

        <div class="meta">
          <p id="statusText">Loading sample data...</p>
          <button id="clearButton" class="clear-button" type="button">Clear</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Artist</th>
                <th>Song</th>
                <th>Plan Name</th>
                <th>Last Updated</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <tr>
        <td colspan="4" class="empty-state">No matching songs found.</td>
      </tr>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
